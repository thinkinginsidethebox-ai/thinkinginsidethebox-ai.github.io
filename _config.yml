title: Thinking Inside the Box
subtitle: Architectural Governance & Bounded Autonomy for Enterprise Agentic AI
description: >-
  Technical insights on building safe, auditable, and sovereign multi-agent systems
  using open standards like MCP, agentgateway, and AGENTS.md — from the Agentic AI
  Foundation Ambassador program.
url: "https://thinkinginsidethebox.ai"
baseurl: ""
lang: en

# Brand & publication identity (not a personal blog)
brand:
  name: Thinking Inside the Box
  tagline: Architectural Governance & Bounded Autonomy for Enterprise Agentic AI
  mascot: Vince the Validator
  aaif_cohort: "AAIF Ambassador Cohort 2026"
  aaif_url: "https://aaif.io/ambassadors"

author:
  name: Vincent Caldeira
  role: AAIF Ambassador · Red Hat APAC CTO
  twitter: vcaldeira
  linkedin: vincentcaldeira
  github: caldeirav
  avatar: /assets/images/thinkinginsidethebox.ai_logo_closeup.png
  bio: >-
    AAIF Ambassador and Red Hat APAC CTO exploring enterprise agentic AI governance,
    bounded autonomy, and sovereign open-source control planes.

logo: /assets/images/thinkinginsidethebox.ai_logo.png
favicon: /assets/images/thinkinginsidethebox.ai_logo_closeup.png

# Default Open Graph image (1200×627 — see assets/images/og/)
image: /assets/images/og/site-default.png
theme_color: "#C91D1D"

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: vincent_caldeira

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "AAIF Ambassador Blog Onboarding & Setup Blueprint.pdf"
  - vendor
