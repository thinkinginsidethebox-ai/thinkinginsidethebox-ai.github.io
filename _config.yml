title: Thinking Inside the Box
subtitle: Architectural Governance & Bounded Autonomy for Enterprise Agentic AI
description: >-
  Agentic AI articles by Vincent Caldeira, AAIF Ambassador — on safety, metacognition,
  evaluation-driven development, and open projects including MCP and agentgateway.
url: "https://thinkinginsidethebox.ai"
baseurl: ""
lang: en

brand:
  name: Thinking Inside the Box
  domain: thinkinginsidethebox.ai
  tagline: Architectural Governance & Bounded Autonomy for Enterprise Agentic AI
  mascot: Vince the Validator
  mascot_logo: /assets/images/thinkinginsidethebox.ai_logo_closeup.png
  aaif_cohort: "AAIF Ambassador Cohort 2026"
  aaif_url: "https://aaif.io/ambassadors"

author:
  name: Vincent Caldeira
  initials: VC
  role: AAIF Ambassador · Red Hat APAC CTO · Columbia University Visiting Scholar
  twitter: vcaldeira
  linkedin: vincentcaldeira
  github: caldeirav
  photo:
  bio: >-
    Vincent Caldeira, Red Hat APAC CTO and Industry Visiting Scholar at Columbia University,
    drives tech strategy and emerging technology engineering. A Top 10 APAC CTO (2023) with
    20+ years in finance IT, he is an authority on open source, cloud-native technologies and AI.
    Vincent holds leadership roles across the Linux Foundation (FINOS, LF AI & Data, Agentic AI
    Foundation, CNCF) and GSF, championing AI safety, sustainability, and digital sovereignty.

logo: /assets/images/thinkinginsidethebox.ai_logo_closeup.png
favicon: /assets/images/thinkinginsidethebox.ai_logo_closeup.png

image: /assets/images/og/site-default.png
theme_color: "#C91D1D"

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: vincent_caldeira

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "AAIF Ambassador Blog Onboarding & Setup Blueprint.pdf"
  - vendor
