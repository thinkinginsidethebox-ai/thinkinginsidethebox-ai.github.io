# Central registry for editorial topics and AAIF / open-source projects.
# Reference slugs in post front matter:
#   topics: [agentic-safety, metacognition]
#   projects: [mcp, agentgateway]

topics:
  - slug: agentic-safety
    label: Agentic Safety
    description: Runtime safety, policy enforcement, and governance patterns for production agentic systems.

  - slug: metacognition
    label: Metacognition
    description: Self-correcting cognitive loops and reflective reasoning inside bounded permissions.

  - slug: evaluation-driven-development
    label: Evaluation Driven Development
    description: Testable, measurable agent behavior validated through structured evaluation harnesses.

  - slug: spec-driven-development
    label: Spec-Driven Development
    description: Phased specification-to-implementation workflows where agents generate code from explicit, governed specs.

projects:
  - slug: mcp
    label: MCP
    description: Model Context Protocol — interoperable tool and context integration for agents.
    url: "https://modelcontextprotocol.io"

  - slug: agentgateway
    label: agentgateway
    description: Architectural control plane for intercepting and governing agent tool execution.
    url: "https://github.com/agentgateway/agentgateway"

  - slug: agents-md
    label: AGENTS.md
    description: AAIF standard for universal agent context — stack, commands, boundaries, and persona registries.
    url: "https://agents.md/"

  - slug: spec-kit
    label: GitHub Spec-Kit
    description: Spec-driven development toolkit — phased specify, plan, and implement workflows for AI agents.
    url: "https://github.com/github/spec-kit"

  - slug: ogx
    label: OGX
    description: Open GenAI Stack — model-agnostic, OpenAI-compatible agentic API server for any model and infrastructure.
    url: "https://github.com/ogx-ai/ogx"

  - slug: lola
    label: Lola
    description: AI context package manager — portable skills, agents, and AGENTS.md modules for cross-assistant deployment.
    url: "https://github.com/LobsterTrap/lola"
